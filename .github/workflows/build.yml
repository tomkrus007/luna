name: Build and Archive

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          xcodebuild -project LunaCalendar.xcodeproj \
            -scheme LunaCalendar \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/LunaCalendar.xcarchive \
            archive

      - name: Export Archive
        run: |
          cp -R build/LunaCalendar.xcarchive build/LunaCalendar_${{ github.sha }}.xcarchive

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: LunaCalendar-xcarchive
          path: build/LunaCalendar_*.xcarchive
          retention-days: 30

      - name: Create DMG
        run: |
          hdiutil create -volname "LunaCalendar" \
            -srcfolder build/LunaCalendar.xcarchive \
            -ov -format UDZO build/LunaCalendar.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LunaCalendar-DMG
          path: build/LunaCalendar.dmg
          retention-days: 30
