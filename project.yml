name: LunaCalendar
options:
  bundleIdPrefix: com.tom
  deploymentTarget:
    macOS: '14.0'
settings:
  base:
    PRODUCT_NAME: LunaCalendar
    SWIFT_VERSION: '6.0'
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  LunaCalendar:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Features
      - path: Services
      - path: Shared
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tom.LunaCalendar
        INFOPLIST_FILE: Config/App-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/LunaCalendar.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIELEMENT: YES
    dependencies:
      - target: LunaCalendarWidgetExtension

  LunaCalendarWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetExtension
      - path: Services/CalendarEngine
      - path: Services/Holiday
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tom.LunaCalendar.WidgetExtension
        INFOPLIST_FILE: Config/Widget-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/LunaCalendarWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        PRODUCT_NAME: LunaCalendarWidgetExtension
        APPLICATION_EXTENSION_API_ONLY: YES
schemes:
  LunaCalendar:
    build:
      targets:
        LunaCalendar: all
        LunaCalendarWidgetExtension: [build]
    run:
      config: Debug
